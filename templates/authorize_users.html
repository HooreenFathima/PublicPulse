<!DOCTYPE html>
<html>
<head>
<title>Authorize Users</title>

<style>

/* Page Background */
body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#6a11cb,#2575fc);
margin:0;
padding:0;
}

/* Heading */
h2{
text-align:center;
color:white;
margin-top:30px;
font-size:32px;
}

/* Table */
table{
width:85%;
margin:40px auto;
border-collapse:collapse;
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* Header */
th{
background:#2575fc;
color:white;
padding:14px;
font-size:16px;
}

/* Table Data */
td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

/* Hover Effect */
tr:hover{
background:#f2f2f2;
}

/* Buttons */
button{
padding:7px 14px;
border:none;
border-radius:5px;
font-size:14px;
cursor:pointer;
margin:3px;
}

/* Approve Button */
button:first-child{
background:#28a745;
color:white;
}

button:first-child:hover{
background:#218838;
}

/* Reject Button */
button:nth-child(2){
background:#dc3545;
color:white;
}

button:nth-child(2):hover{
background:#c82333;
}

/* Delete Button */
.delete-btn{
background:black;
color:white;
}

.delete-btn:hover{
background:#333;
}

/* Home Button Container */
.home-container{
width:85%;
margin:auto;
text-align:right;
}

/* Home Button */
.home-btn{
background:#ffc107;
color:black;
padding:10px 18px;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
margin-bottom:40px;
}

.home-btn:hover{
background:#e0a800;
}

</style>

</head>

<body>

<h2>Authorize Users</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Username</th>
<th>Email</th>
<th>Mobile</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for user in users %}

<tr>
<td>{{user.id}}</td>
<td>{{user.username}}</td>
<td>{{user.email}}</td>
<td>{{user.mobile}}</td>
<td>{{user.status}}</td>

<td>

<form action="/approve_user/{{user.id}}" method="post" style="display:inline;">
<button type="submit">Approve</button>
</form>

<form action="/reject_user/{{user.id}}" method="post" style="display:inline;">
<button type="submit">Reject</button>
</form>

<form action="/delete_user/{{user.id}}" method="post" style="display:inline;">
<button class="delete-btn" type="submit">Delete</button>
</form>

</td>

</tr>

{% endfor %}

</table>

<div class="home-container">
<a href="/">
<button class="home-btn">Home</button>
</a>
</div>

</body>
</html>
