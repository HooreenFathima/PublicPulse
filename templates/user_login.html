<!DOCTYPE html>
<html>
<head>
<title>User Login</title>

<style>

/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* FULL BACKGROUND IMAGE */
body{
    height:100vh;

    background: url("{{ url_for('static', filename='images/flag.png') }}") no-repeat center center;
    background-size: cover;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* DARK OVERLAY */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    top:0;
    left:0;
}

/* CENTER GLASS BOX */
.main-container{
    position:relative;
    z-index:1;

    width:350px;
    padding:40px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);

    border-radius:15px;
    box-shadow:0 8px 30px rgba(0,0,0,0.4);

    text-align:center;
}

/* TITLE */
.main-container h1{
    color:white;
    margin-bottom:25px;
    font-size:28px;
}

/* LABELS */
label{
    display:block;
    text-align:left;
    margin-top:15px;
    color:white;
    font-size:14px;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin-top:6px;

    border:none;
    border-radius:25px;

    background: rgba(255,255,255,0.7);
    outline:none;
    font-size:14px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:25px;

    border:none;
    border-radius:25px;

    background:#f4c542;
    color:black;
    font-weight:bold;
    font-size:16px;

    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e0b932;
}

</style>

</head>

<body>

<div class="main-container">

    <h1>User Login</h1>

    <form method="POST">

        <label>Username</label>
        <input type="text" name="username" placeholder="Enter Username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
