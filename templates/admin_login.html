<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* BACKGROUND IMAGE */
body{
    height:100vh;

    background: url("{{ url_for('static', filename='images/government.png') }}") no-repeat center center;

    /* balanced size (not too zoomed, not too small) */
    background-size: 100%;
    background-color: black; /* fills empty space */

    display:flex;
    justify-content:center;
    align-items:center;
}

/* DARK OVERLAY */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    top:0;
    left:0;
}

/* LOGIN BOX */
.login-box{
    position:relative;
    z-index:1;

    width:420px;              /* increased size */
    padding:50px 40px;

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);

    border-radius:18px;
    border:1px solid rgba(255,255,255,0.2);

    box-shadow:0 10px 40px rgba(0,0,0,0.4);

    text-align:center;
}

/* ICON */
.icon{
    width:70px;
    height:70px;
    margin:auto;
    margin-top:-70px;
    margin-bottom:15px;

    background: linear-gradient(135deg,#1e90ff,#00c6ff);
    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:30px;
    color:white;
}

/* TITLE */
.login-box h2{
    color:white;
    margin-bottom:25px;
    font-size:22px;
}

/* INPUT */
.input-box{
    margin:18px 0;
}

.input-box input{
    width:100%;
    padding:14px;

    border:none;
    border-radius:8px;

    background: rgba(255,255,255,0.7);
    font-size:15px;
    outline:none;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    margin-top:20px;

    border:none;
    border-radius:8px;

    background: linear-gradient(90deg,#1e90ff,#00c6ff);
    color:white;
    font-size:17px;

    cursor:pointer;
    transition:0.3s;
}

button:hover{
    opacity:0.9;
}

</style>

</head>

<body>

<div class="login-box">

    <div class="icon">👤</div>

    <h2>Admin Login</h2>

    <form method="POST">

        <div class="input-box">
            <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit">LOGIN</button>

    </form>

</div>

</body>
</html>
